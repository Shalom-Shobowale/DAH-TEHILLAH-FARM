                </div>

                </div>

        <div class="bg-white rounded-xl shadow-sm p-6">

            class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6"

            <div class="flex-1">
              <input
                type="text"
                id="searchInput"
                placeholder="Search by name or email..."
                class="w-full md:w-80 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
              />
            </div>
            <select
              id="statusFilter"
              class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
            >
              <option value="all">All Status</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="suspended">Suspended</option>
            </select>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr class="border-b border-gray-200">
                  <th class="text-left py-3 px-4 text-gray-600 font-semibold">
                    Member
                  </th>
                  <th class="text-left py-3 px-4 text-gray-600 font-semibold">
                    Phone
                  </th>
                  <th class="text-left py-3 px-4 text-gray-600 font-semibold">
                    Status
                  </th>
                  <th class="text-left py-3 px-4 text-gray-600 font-semibold">
                    Registered
                  </th>
                  <th class="text-left py-3 px-4 text-gray-600 font-semibold">
                    Actions
                  </th>
                </tr>
              </thead>
              <tbody id="membersTable">
                <tr>
                  <td colspan="5" class="text-center py-8 text-gray-500">

                  </td>

    <script>
      function checkAuth() {
        const user = JSON.parse(localStorage.getItem("user"));
        const token = localStorage.getItem("accessToken");
        if (!user || !token || user.role !== "admin") {
          window.location.href = "./login.html";
        }
      }

      async function fetchMembers() {
        const search = document.getElementById("searchInput").value;
        const status = document.getElementById("statusFilter").value;
        const token = localStorage.getItem("accessToken");

        try {
          const params = new URLSearchParams();
          if (search) params.append("search", search);
          if (status !== "all") params.append("status", status);

          const response = await fetch(
            `http://localhost:3000/api/admin/users?${params.toString()}`,
            {
              headers: { Authorization: `Bearer ${token}` },
            },
          );
          const data = await response.json();

          if (data.success) {
            renderMembers(data.data);
          }
        } catch (error) {
          console.error("Error fetching members:", error);
        }
      }

      function renderMembers(members) {
        const tbody = document.getElementById("membersTable");
        if (members.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="5" class="text-center py-8 text-gray-500">No members found</td></tr>';
          return;
        }

        tbody.innerHTML = members
          .map(
            (m) => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="py-4 px-4">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white font-bold mr-3">
                                ${m.full_name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="font-semibold text-gray-800">${m.full_name}</p>
                                <p class="text-sm text-gray-500">${m.email}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-gray-600">${m.phone || "N/A"}</td>
                    <td class="py-4 px-4">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatusClass(m.status)}">${m.status}</span>
                    </td>
                    <td class="py-4 px-4 text-gray-600">${new Date(m.created_at).toLocaleDateString()}</td>
                    <td class="py-4 px-4">
                        <div class="flex space-x-2">
                            ${m.status === "pending" ? `<button onclick="approveUser('${m.id}')" class="bg-primary text-white px-3 py-1 rounded-lg text-sm hover:bg-green-800">Approve</button>` : ""}
                            ${m.status === "approved" ? `<button onclick="suspendUser('${m.id}')" class="bg-yellow-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-yellow-600">Suspend</button>` : ""}
                            ${m.status === "suspended" ? `<button onclick="approveUser('${m.id}')" class="bg-primary text-white px-3 py-1 rounded-lg text-sm hover:bg-green-800">Reactivate</button>` : ""}
                            <button onclick="deleteUser('${m.id}')" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600">Delete</button>
                        </div>
                    </td>
                </tr>
            `,
          )
          .join("");
      }

      function getStatusClass(status) {
        switch (status) {
          case "approved":
            return "bg-green-100 text-green-800";
          case "pending":
            return "bg-yellow-100 text-yellow-800";
          case "suspended":
            return "bg-red-100 text-red-800";
          default:
            return "bg-gray-100 text-gray-800";
        }
      }

      async function approveUser(id) {
        if (!confirm("Approve this member?")) return;
        const token = localStorage.getItem("accessToken");
        try {
          const response = await fetch(`http://localhost:3000/api/admin/users/${id}/approve`, {
            method: "PATCH",
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await response.json();
          if (data.success) {
            alert("Member approved successfully");
            fetchMembers();
          } else {
            alert(data.message);
          }
        } catch (error) {
          alert("Error approving member");
        }
      }

      async function suspendUser(id) {
        if (!confirm("Suspend this member?")) return;
        const token = localStorage.getItem("accessToken");
        try {
          const response = await fetch(`http://localhost:3000/api/admin/users/${id}/suspend`, {
            method: "PATCH",
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await response.json();
          if (data.success) {
            alert("Member suspended");
            fetchMembers();
          } else {
            alert(data.message);
          }
        } catch (error) {
          alert("Error suspending member");
        }
      }

      async function deleteUser(id) {
        if (!confirm("Delete this member? This action cannot be undone."))
          return;
        const token = localStorage.getItem("accessToken");
        try {
          const response = await fetch(`http://localhost:3000/api/admin/users/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await response.json();
          if (data.success) {
            alert("Member deleted");
            fetchMembers();
          } else {
            alert(data.message);
          }
        } catch (error) {
          alert("Error deleting member");
        }
      }

      function logout() {
        localStorage.clear();
        window.location.href = "./login.html";
      }

      document
        .getElementById("searchInput")
        .addEventListener("input", fetchMembers);
      document
        .getElementById("statusFilter")
        .addEventListener("change", fetchMembers);

      checkAuth();
      fetchMembers();

      const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");
const closeBtn = document.getElementById("closeBtn");
const overlay = document.getElementById("overlay");

menuBtn.onclick = () => {

    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");

};

closeBtn.onclick = closeMenu;
overlay.onclick = closeMenu;

function closeMenu(){

    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");

}

window.addEventListener("resize",()=>{

    if(window.innerWidth>=1024){

        sidebar.classList.remove("-translate-x-full");
        overlay.classList.add("hidden");

    }else{

        sidebar.classList.add("-translate-x-full");

    }

});
    </script>
