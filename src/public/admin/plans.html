      <main class="flex-1 lg:ml-64 p-4 md:p-6 lg:p-8">
       <header class="flex items-center justify-between mb-8">

    <div class="flex items-center gap-4">

       <form id="planForm" class="space-y-6">

    <input type="hidden" id="planId">

    <!-- Plan Name -->
    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
            Plan Name
        </label>

        <input
            type="text"
            id="name"
            required
            class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
    </div>

    <!-- Description -->
    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
            Description
        </label>

        <textarea
            id="description"
            rows="4"
            class="w-full rounded-lg border border-gray-300 px-4 py-3 resize-none focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"></textarea>
    </div>

    <!-- Price + Admin Fee -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Slot Price (₦)
            </label>

            <input
                type="number"
                id="slot_price"
                min="0"
                required
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Admin Fee (₦)
            </label>

            <input
                type="number"
                id="admin_fee"
                min="0"
                required
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
        </div>

    </div>

    <!-- ROI + Duration -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                ROI (%)
            </label>

            <input
                type="number"
                id="roi_percentage"
                min="0"
                max="100"
                required
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Duration (Months)
            </label>

            <input
                type="number"
                id="duration_months"
                min="1"
                required
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
        </div>

    </div>

    <!-- Max Slots + Status -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Maximum Slots
            </label>

            <input
                type="number"
                id="max_slots"
                min="1"
                placeholder="Optional"
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary outline-none">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Status
            </label>

            <select
                id="status"
                class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-primary outline-none">

                <option value="active">🟢 Active</option>
                <option value="inactive">🔴 Inactive</option>

            </select>
        </div>

    </div>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 pt-2">

        <button
            type="button"
            onclick="closeModal()"
            class="w-full sm:w-1/2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 rounded-lg transition">

            Cancel

        </button>

        <button
            type="submit"
            class="w-full sm:w-1/2 bg-primary hover:bg-green-800 text-white font-semibold py-3 rounded-lg transition">

            Save Plan

        </button>

    </div>

</form>

    <script>
      const API_BASE = "http://dah-tehillah-farm.onrender.com";

      function checkAuth() {
        const user = JSON.parse(localStorage.getItem("user"));
        const token = localStorage.getItem("accessToken");
        if (!user || !token || user.role !== "admin") {
          window.location.href = "login.html";
        }
      }

      async function fetchPlans() {
        const token = localStorage.getItem("accessToken");

        try {
          const response = await fetch(`${API_BASE}/api/admin/plans`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          const data = await response.json();

          if (data.success) {
            renderPlans(data.data);
          } else {
            alert(data.message || "Failed to load plans");
          }
        } catch (error) {
          console.error("Error fetching plans:", error);
        }
      }

      function renderPlans(plans) {
        const grid = document.getElementById("plansGrid");

        if (!plans.length) {
          grid.innerHTML = `<div class="col-span-full text-center py-8 text-gray-500">No plans found</div>`;
          return;
        }

        grid.innerHTML = plans
          .map(
            (plan) => `
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="p-6">
                    
                    <div class="flex justify-between items-center mb-3">
                        <span class="px-3 py-1 text-xs rounded-full font-semibold 
                            ${plan.status === "active" ? "bg-green-100 text-green-800" : "bg-gray-200 text-gray-700"}">
                            ${plan.status}
                        </span>

                        <div class="space-x-2">
                            <button onclick='loadPlanForEdit("${plan.id}")' class="text-primary text-sm hover:underline">
                                Edit
                            </button>
                            <button onclick='deletePlan("${plan.id}")' class="text-red-500 text-sm hover:underline">
                                Delete
                            </button>
                        </div>
                    </div>

                    <h3 class="text-xl font-bold text-gray-800 mb-2">${plan.name}</h3>

                    <p class="text-gray-500 text-sm mb-4">
                        ${plan.description || "No description"}
                    </p>

                    <div class="grid grid-cols-2 gap-3 border-t pt-4">
                        <div>
                            <p class="text-xs text-gray-400">Amount</p>
                            <p class="font-bold text-primary">
                                ₦${Number(plan.slot_price).toLocaleString()}
                            </p>
                        </div>

                        <div>
                            <p class="text-xs text-gray-400">ROI</p>
                            <p class="font-bold text-accent">
                                ${plan.roi_percentage}%
                            </p>
                        </div>

                        <div class="col-span-2">
                            <p class="text-xs text-gray-400">Duration</p>
                            <p class="font-semibold">
                                ${plan.duration_months} months
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        `,
          )
          .join("");
      }

      function openModal(plan = null) {
        const modal = document.getElementById("planModal");
        const title = document.getElementById("modalTitle");

        if (plan) {
          title.textContent = "Edit Plan";

          document.getElementById("planId").value = plan.id;

          document.getElementById("name").value = plan.name;
          document.getElementById("description").value = plan.description || "";

          document.getElementById("slot_price").value = plan.slot_price;
          document.getElementById("admin_fee").value = plan.admin_fee || 0;

          document.getElementById("roi_percentage").value = plan.roi_percentage;
          document.getElementById("duration_months").value =
            plan.duration_months;

          document.getElementById("max_slots").value = plan.max_slots || "";

          document.getElementById("status").value = plan.status;
        } else {
          title.textContent = "Add New Plan";

          document.getElementById("planForm").reset();
          document.getElementById("planId").value = "";
        }

        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function closeModal() {
        const modal = document.getElementById("planModal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }

      // FIXED: single plan load (instead of fetching all again)
      async function loadPlanForEdit(id) {
        const token = localStorage.getItem("accessToken");

        try {
          const response = await fetch(`${API_BASE}/api/admin/plans`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          const data = await response.json();

          if (data.success) {
            const plan = data.data.find((p) => p.id === id);
            if (plan) openModal(plan);
          }
        } catch (err) {
          alert("Failed to load plan");
        }
      }

      async function deletePlan(id) {
        if (!confirm("Are you sure you want to delete this plan?")) return;

        const token = localStorage.getItem("accessToken");

        try {
          const response = await fetch(`${API_BASE}/api/admin/plans/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });

          const data = await response.json();

          if (data.success) {
            alert("Plan deleted");
            fetchPlans();
          } else {
            alert(data.message || "Delete failed");
          }
        } catch (error) {
          alert("Error deleting plan");
        }
      }

      document
        .getElementById("planForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const token = localStorage.getItem("accessToken");
          const planId = document.getElementById("planId").value;

          // FIXED FIELD MAPPING (backend-compatible)
          const payload = {
            name: document.getElementById("name").value,
            description: document.getElementById("description").value,
            slot_price: parseFloat(document.getElementById("slot_price").value),
            admin_fee: parseFloat(document.getElementById("admin_fee").value),
            roi_percentage: parseFloat(
              document.getElementById("roi_percentage").value,
            ),
            duration_months: parseInt(
              document.getElementById("duration_months").value,
            ),
            max_slots: document.getElementById("max_slots").value
              ? parseInt(document.getElementById("max_slots").value)
              : null,
            status: document.getElementById("status").value,
          };

          try {
            const url = planId
              ? `${API_BASE}/api/admin/plans/${planId}`
              : `${API_BASE}/api/admin/plans`;

            const method = planId ? "PUT" : "POST";

            const response = await fetch(url, {
              method,
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(payload),
            });

            const data = await response.json();

            if (data.success) {
              alert(planId ? "Plan updated" : "Plan created");
              closeModal();
              fetchPlans();
            } else {
              alert(data.message || "Failed to save plan");
            }
          } catch (error) {
            console.error(error);
            alert("Server error while saving plan");
          }
        });

      function logout() {
        localStorage.clear();
        window.location.href = "login.html";
      }

      checkAuth();
      fetchPlans();

      const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleSidebar() {
    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");
}

function closeSidebar() {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
}

// Desktop
window.addEventListener("resize", () => {

    if (window.innerWidth >= 1024) {

        sidebar.classList.remove("-translate-x-full");
        overlay.classList.add("hidden");

    } else {

        sidebar.classList.add("-translate-x-full");

    }

});

// Close sidebar after clicking a menu item on mobile
document.querySelectorAll("#sidebar a").forEach(link => {

    link.addEventListener("click", () => {

        if (window.innerWidth < 1024) {

            closeSidebar();

        }

    });

});
    </script>
