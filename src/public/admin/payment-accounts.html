    </div>

                <a href="plans.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">

                    Activity Logs

            <div class="absolute bottom-6 left-6 right-6">
                <button onclick="logout()" class="w-full flex items-center px-4 py-3 text-white/70 hover:bg-red-600 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout

        </aside>

        <main class="flex-1 lg:ml-64 p-4 md:p-6 lg:p-8">
                <header class="flex flex-wrap justify-between items-center gap-4 mb-8">
                            
                    <div class="flex items-center gap-3">
                    
                        <button id="menuBtn"
                            class="lg:hidden bg-primary text-white p-2 rounded-lg shadow">
                        
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="w-6 h-6"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24">

                            <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"/>
                        
                        </svg>
                    
                        </button>

                    <div>
                    
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-800">
                    Payment Accounts
                    </h1>

                    <p class="text-gray-500">
                    Manage bank accounts for receiving payments
                    </p>

                    </div>

                    </div>

                    <button
                    onclick="openModal()"
                    class="bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-800 transition">

                    + Add Account

                    </button>

                    </header>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Bank Name</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Account Name</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Account Number</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Status</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="accountsTable">
                            <tr><td colspan="5" class="text-center py-8 text-gray-500">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="accountModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800" id="modalTitle">Add Account</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="accountForm" class="space-y-4">
                <input type="hidden" id="accountId">
                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Bank Name</label>
                    <input type="text" id="bank_name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Account Name</label>
                    <input type="text" id="account_name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Account Number</label>
                    <input type="text" id="account_number" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="flex items-center space-x-2">
                        <input type="checkbox" id="is_active" class="w-4 h-4 text-primary focus:ring-primary border-gray-300 rounded">
                        <span class="text-gray-700">Set as Active (visible to members)</span>
                    </label>
                </div>
                <div class="flex space-x-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg font-semibold hover:bg-gray-300 transition">Cancel</button>
                    <button type="submit" class="flex-1 bg-primary text-white py-2 rounded-lg font-semibold hover:bg-green-800 transition">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('accessToken');
            if (!user || !token || user.role !== 'admin') {
                window.location.href = 'login.html';
            }
        }

        async function fetchAccounts() {
            const token = localStorage.getItem('accessToken');
            try {
                const response = await fetch('https://dah-tehillah-farm.onrender.com/api/admin/payment-accounts', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    renderAccounts(data.data);
                }
            } catch (error) {
                console.error('Error fetching accounts:', error);
            }
        }

        function renderAccounts(accounts) {
            const tbody = document.getElementById('accountsTable');
            if (accounts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">No payment accounts found</td></tr>';
                return;
            }

            tbody.innerHTML = accounts.map(acc => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="py-4 px-4 font-semibold text-gray-800">${acc.bank_name}</td>
                    <td class="py-4 px-4 text-gray-600">${acc.account_name}</td>
                    <td class="py-4 px-4 font-mono text-gray-800">${acc.account_number}</td>
                    <td class="py-4 px-4">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${acc.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">${acc.is_active ? 'Active' : 'Inactive'}</span>
                    </td>
                    <td class="py-4 px-4">
                        <div class="flex space-x-2">
                            <button onclick="editAccount('${acc.id}')" class="text-primary hover:underline text-sm">Edit</button>
                            ${!acc.is_active ? `<button onclick="setActive('${acc.id}')" class="text-accent hover:underline text-sm">Set Active</button>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(account = null) {
            const modal = document.getElementById('accountModal');
            const title = document.getElementById('modalTitle');

            if (account) {
                title.textContent = 'Edit Account';
                document.getElementById('accountId').value = account.id;
                document.getElementById('bank_name').value = account.bank_name;
                document.getElementById('account_name').value = account.account_name;
                document.getElementById('account_number').value = account.account_number;
                document.getElementById('is_active').checked = account.is_active;
            } else {
                title.textContent = 'Add Account';
                document.getElementById('accountForm').reset();
                document.getElementById('accountId').value = '';
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('accountModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function editAccount(id) {
            const token = localStorage.getItem('accessToken');
            try {
                const response = await fetch('https://dah-tehillah-farm.onrender.com/api/admin/payment-accounts', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    const account = data.data.find(a => a.id === id);
                    if (account) openModal(account);
                }
            } catch (error) {
                alert('Error loading account');
            }
        }

        async function setActive(id) {
            if (!confirm('Set this account as active? Only one account can be active at a time.')) return;
            const token = localStorage.getItem('accessToken');

            try {
                const response = await fetch(`https://dah-tehillah-farm.onrender.com/api/admin/payment-accounts/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ is_active: true })
                });
                const data = await response.json();
                if (data.success) {
                    alert('Account set as active');
                    fetchAccounts();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Error updating account');
            }
        }

        document.getElementById('accountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('accessToken');
            const accountId = document.getElementById('accountId').value;

            const accountData = {
                bank_name: document.getElementById('bank_name').value,
                account_name: document.getElementById('account_name').value,
                account_number: document.getElementById('account_number').value,
                is_active: document.getElementById('is_active').checked
            };

            try {
                const url = accountId ? `https://dah-tehillah-farm.onrender.com/api/admin/payment-accounts/${accountId}` : 'https://dah-tehillah-farm.onrender.com/api/admin/payment-accounts';
                const method = accountId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(accountData)
                });

                const data = await response.json();
                if (data.success) {
                    alert(accountId ? 'Account updated' : 'Account created');
                    closeModal();
                    fetchAccounts();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Error saving account');
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        checkAuth();
        fetchAccounts();

        const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");
const closeBtn = document.getElementById("closeMenu");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", () => {
    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");
});

closeBtn.addEventListener("click", closeSidebar);
overlay.addEventListener("click", closeSidebar);

function closeSidebar() {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
}

window.addEventListener("resize", () => {
    if (window.innerWidth >= 1024) {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.add("hidden");
    } else {
        sidebar.classList.add("-translate-x-full");
    }
});

document.querySelectorAll("#sidebar a").forEach(link => {
    link.addEventListener("click", () => {
        if (window.innerWidth < 1024) {
            closeSidebar();
        }
    });
});
    </script>
