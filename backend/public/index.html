<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DA-TEHILLAH FARMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="/src/images/DA-RL4.png" type="image/x-icon">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#14532D',
                        accent: '#FACC15',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-primary w-20 h-20 rounded-full mx-auto flex items-center justify-center mb-4">
                <svg class="w-10 h-10 text-accent" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-primary">DA-TEHILLAH</h1>
            <p class="text-gray-600 text-sm">FARM VENTURES</p>
            <p class="text-gray-500 text-sm mt-2">Create Your Account</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Full Name</label>
                <input type="text" id="full_name" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                    placeholder="John Doe">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                    placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Phone Number</label>
                <input type="tel" id="phone" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                    placeholder="+234 800 000 0000">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                    placeholder="Min 8 chars, uppercase, lowercase, number & special char">
                <p class="text-xs text-gray-500 mt-1">Must contain uppercase, lowercase, number, and special character</p>
            </div>
            <div id="errorMessage" class="hidden bg-red-100 text-red-700 px-4 py-3 rounded-lg text-sm"></div>
            <div id="successMessage" class="hidden bg-green-100 text-green-700 px-4 py-3 rounded-lg text-sm"></div>
            <button type="submit" id="registerBtn"
                class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-green-800 transition duration-200 flex items-center justify-center">
                <span>Register</span>
                <svg class="hidden animate-spin ml-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
        <p class="text-center text-gray-500 text-sm mt-6">
            Already have an account? <a href="login.html" class="text-primary hover:underline">Login here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const full_name = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('registerBtn');
            const spinner = btn.querySelector('svg');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            btn.disabled = true;
            spinner.classList.remove('hidden');

            try {
               const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, email, phone, password })
                });

                const data = await response.json();

                if (data.success) {
                    successDiv.textContent = data.message || 'Registration successful! Please wait for admin approval.';
                    successDiv.classList.remove('hidden');
                    document.getElementById('registerForm').reset();

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    if (data.errors && data.errors.length > 0) {
                        errorDiv.textContent = data.errors.join('. ');
                    } else {
                        errorDiv.textContent = data.message || 'Registration failed';
                    }
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
