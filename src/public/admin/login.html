<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DA-TEHILLAH FARMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="/src/images/DA-RL4.png" type="image/x-icon">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#14532D",
              accent: "#FACC15",
            },
          },
        },
      };
    </script>
  </head>
  <!-- BACK BUTTON -->
<a href="/src/index.html"
   class="fixed top-4 left-4 z-50 inline-flex items-center gap-2
          bg-gradient-to-r from-green-600 to-emerald-500
          hover:from-green-700 hover:to-emerald-600
          text-white font-semibold
          px-5 py-3 rounded-full
          shadow-xl hover:shadow-2xl
          transition-all duration-300
          hover:-translate-y-1 hover:scale-105
          active:scale-95">

    <!-- Arrow -->
    <svg xmlns="http://www.w3.org/2000/svg"
         class="w-5 h-5 transition-transform duration-300 group-hover:-translate-x-1"
         fill="none"
         viewBox="0 0 24 24"
         stroke="currentColor"
         stroke-width="2">

        <path stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 19l-7-7 7-7"/>

    </svg>

    <span class="hidden sm:inline">
        Back Home
    </span>

</a>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
      <div class="text-center mb-8">
        <div
          class="bg-primary w-20 h-20 rounded-full mx-auto flex items-center justify-center mb-4"
        >
          <img src="/src/images/DA-RL4.png" alt="">
            <path
              d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-primary">DA-TEHILLAH</h1>
        <p class="text-gray-600 text-sm">FARM VENTURES</p>
        <p class="text-gray-500 text-sm mt-2">Admin Dashboard</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-gray-700 text-sm font-semibold mb-2"
            >Email</label
          >
          <input
            type="email"
            id="email"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
            placeholder="admin@datehillahfarms.com"
          />
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-semibold mb-2"
            >Password</label
          >
          <input
            type="password"
            id="password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
            placeholder="Enter your password"
          />
        </div>
        <div
          id="errorMessage"
          class="hidden bg-red-100 text-red-700 px-4 py-3 rounded-lg text-sm"
        ></div>
        <button
          type="submit"
          id="loginBtn"
          class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-green-800 transition duration-200 flex items-center justify-center"
        >
          <span>Login</span>
          <svg
            class="hidden animate-spin ml-2 h-5 w-5 text-white"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        </button>
      </form>
      <p class="text-center text-gray-500 text-sm mt-6">
        Member?
        <a href="../member/login.html" class="text-primary hover:underline"
          >Login here</a
        >
      </p>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const btn = document.getElementById("loginBtn");
          const spinner = btn.querySelector("svg");
          const errorDiv = document.getElementById("errorMessage");

          errorDiv.classList.add("hidden");
          btn.disabled = true;
          spinner.classList.remove("hidden");

          try {
            const response = await fetch(
              "https://dah-tehillah-farm.onrender.com/api/admin/activity-logs",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password }),
              },
            );
            const data = await response.json();

            if (data.success && data.data.user.role === "admin") {
              localStorage.setItem("accessToken", data.data.accessToken);
              localStorage.setItem("refreshToken", data.data.refreshToken);
              localStorage.setItem("user", JSON.stringify(data.data.user));
              window.location.href = "dashboard.html";
            } else if (data.success && data.data.user.role !== "admin") {
              errorDiv.textContent = "Access denied. Admin only.";
              errorDiv.classList.remove("hidden");
            } else {
              errorDiv.textContent = data.message || "Login failed";
              errorDiv.classList.remove("hidden");
            }
          } catch (error) {
            errorDiv.textContent = "Network error. Please try again.";
            errorDiv.classList.remove("hidden");
          } finally {
            btn.disabled = false;
            spinner.classList.add("hidden");
          }
        });
    </script>
  </body>
</html>
