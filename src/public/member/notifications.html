            DA-TEHILLAH FARMS

        <div class="w-10"></div>

</header>

<!-- Overlay -->
<div
id="overlay"
class="fixed inset-0 bg-black/50 hidden z-40 lg:hidden"
onclick="closeSidebar()"></div>


    <div class="flex min-h-screen">
        <aside id="sidebar"
        class="fixed top-0 left-0 w-64 h-screen bg-primary p-6 overflow-y-auto z-50
        transform -translate-x-full lg:translate-x-0
        transition-transform duration-300">
            <div class="mb-8">
                <div class="flex items-center space-x-3">
                    <div class="bg-accent w-10 h-10 rounded-full flex items-center justify-center">
                        <img src="/src/images/DA-RL4.png" alt="">
                    </div>
                    <div>
                        <h1 class="text-white font-bold">DA-TEHILLAH</h1>
                        <p class="text-accent text-xs">FARM VENTURES</p>
                    </div>
                    <!-- Mobile Close Button -->
<div class="flex justify-end mb-4 lg:hidden">
    <button onclick="closeSidebar()" class="text-white">
        <svg xmlns="http://www.w3.org/2000/svg"
            class="w-7 h-7"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24">

            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"/>

        </svg>
    </button>
</div>
                </div>
            </div>

            <nav class="space-y-2">
                <a href="dashboard.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="investments.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    My Investments
                </a>
                <a href="plans.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Investment Plans
                </a>
                <a href="notifications.html" class="flex items-center px-4 py-3 bg-primary/50 text-white rounded-lg border-l-4 border-accent">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    Notifications
                </a>
                <a href="profile.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Profile
                </a>
            </nav>

            <div class="absolute bottom-6 left-6 right-6">
                <button onclick="logout()" class="w-full flex items-center px-4 py-3 text-white/70 hover:bg-red-600 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-64 p-4 sm:p-6 lg:p-8 pt-24 lg:pt-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Notifications</h1>
                    <p class="text-gray-500">Stay updated with your investments</p>
                </div>
                <button onclick="markAllRead()" class="text-primary hover:underline text-sm">Mark all as read</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6">
                <div id="notificationsList" class="space-y-4">
                    <p class="text-gray-500 text-center py-8">Loading notifications...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('accessToken');
            if (!user || !token || user.role !== 'member') {
                window.location.href = 'login.html';
            }
        }

        async function fetchNotifications() {
            const token = localStorage.getItem('accessToken');
            try {
                const response = await fetch('https://dah-tehillah-farm.onrender.com/api/member/notifications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    renderNotifications(data.data);
                }
            } catch (error) {
                console.error('Error fetching notifications:', error);
            }
        }

        function renderNotifications(notifications) {
            const container = document.getElementById('notificationsList');

            if (notifications.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">No notifications</p>';
                return;
            }

            container.innerHTML = notifications.map(notif => `
                <div class="flex items-start space-x-4 p-4 rounded-lg ${notif.is_read ? 'bg-gray-50' : 'bg-primary/5 border-l-4 border-primary'}">
                    <div class="flex-shrink-0">
                        <div class="w-10 h-10 ${notif.is_read ? 'bg-gray-200' : 'bg-primary'} rounded-full flex items-center justify-center">
                            <svg class="w-5 h-5 ${notif.is_read ? 'text-gray-500' : 'text-white'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                            </svg>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-semibold text-gray-800">${notif.title}</p>
                                <p class="text-gray-600 mt-1">${notif.message}</p>
                            </div>
                            <p class="text-sm text-gray-400">${new Date(notif.created_at).toLocaleDateString()}</p>
                        </div>
                        ${!notif.is_read ? `<button onclick="markRead('${notif.id}')" class="text-primary text-sm hover:underline mt-2">Mark as read</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function markRead(id) {
            const token = localStorage.getItem('accessToken');
            try {
                await fetch(`https://dah-tehillah-farm.onrender.com/api/member/notifications/${id}/read`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                fetchNotifications();
            } catch (error) {
                console.error('Error marking notification as read:', error);
            }
        }

        async function markAllRead() {
            const token = localStorage.getItem('accessToken');
            try {
                await fetch('https://dah-tehillah-farm.onrender.com/api/member/notifications/read-all', {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                fetchNotifications();
            } catch (error) {
                console.error('Error marking all notifications as read:', error);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        checkAuth();
        fetchNotifications();

        const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleSidebar() {
    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");
}

function closeSidebar() {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
}

// Keep sidebar open on desktop
window.addEventListener("resize", () => {
    if (window.innerWidth >= 1024) {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.add("hidden");
    } else {
        sidebar.classList.add("-translate-x-full");
    }
});

// Close sidebar when a menu link is clicked
document.querySelectorAll("#sidebar a").forEach(link => {
    link.addEventListener("click", () => {
        if (window.innerWidth < 1024) {
            closeSidebar();
        }
    });
});
    </script>
</body>
</html>
