       <main class="flex-1 lg:ml-64 p-4 sm:p-6 lg:p-8 pt-6 lg:pt-8">

</header>
        <select
            id="statusFilter"

            <option value="all">All Investments</option>

    </div>

    <!-- Statistics -->

        <div class="bg-white rounded-xl shadow-sm p-6">

            </p>

        <div class="bg-white rounded-xl shadow-sm p-6">

            <p class="text-2xl md:text-3xl font-bold text-accent" id="expectedReturns">
                ₦0
            </p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 sm:col-span-2 lg:col-span-1">
            <p class="text-gray-500 text-sm mb-1">Total Investments</p>
            <p class="text-2xl md:text-3xl font-bold text-gray-800" id="totalInvestments">
                0
            </p>
        </div>

    </div>

    <!-- Table -->

        <div class="overflow-x-auto">

            <table class="min-w-[850px] w-full">

                <thead>

                    <tr class="border-b border-gray-200">

                        <th class="text-left py-3 px-4 font-semibold text-gray-600">Plan</th>
                        <th class="text-left py-3 px-4 font-semibold text-gray-600">Amount</th>
                        <th class="text-left py-3 px-4 font-semibold text-gray-600">Expected Return</th>
                        <th class="text-left py-3 px-4 font-semibold text-gray-600">Payment Status</th>
                        <th class="text-left py-3 px-4 font-semibold text-gray-600">Investment Status</th>
                        <th class="text-left py-3 px-4 font-semibold text-gray-600">Date</th>

                    </tr>

                </thead>

    </div>

    <script>
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('accessToken');
            if (!user || !token || user.role !== 'member') {
                window.location.href = 'login.html';
            }
        }

        let allInvestments = [];

    async function fetchInvestments() {
    const token = localStorage.getItem("accessToken");

    try {
        const response = await fetch(
            "https://api.da-tehillah-farms.com/api/member/investments",
            {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            }
        );

        const data = await response.json();

        if (!response.ok) {
            console.error("Fetch investments failed:", data);
            alert(data.message || "Failed to load investments.");
            return;
        }

        allInvestments = data.data || [];
        updateStats(allInvestments);
        renderInvestments(allInvestments);

    } catch (err) {
        console.error(err);
        alert("Network error while loading investments.");
    }
}

        function updateStats(investments) {
            const totalInvested = investments.reduce(
    (sum, inv) => sum + Number(inv.slot_price || 0),
    0
);

const expectedReturns = investments.reduce((sum, inv) => {
    const amount = Number(inv.slot_price || 0);
    const slots = Number(inv.number_of_slots || 1);
    const roi = Number(inv.investment_plans?.roi_percentage || 0);

    return sum + (amount * slots * roi / 100);
}, 0);

            document.getElementById('totalInvested').textContent = '₦' + totalInvested.toLocaleString();
            document.getElementById('expectedReturns').textContent = '₦' + expectedReturns.toLocaleString();
            document.getElementById('totalInvestments').textContent = investments.length;
        }

        function renderInvestments(investments) {
            const tbody = document.getElementById('investmentsTable');
            const statusFilter = document.getElementById('statusFilter').value;

            let filtered = investments;
            if (statusFilter !== 'all') {
                filtered = investments.filter(inv => inv.investment_status === statusFilter);
            }

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">No investments found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(inv => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="py-4 px-4">
                        <p class="font-semibold text-gray-800">
    ${inv.investment_plans?.name || "N/A"}
</p>

<p class="text-sm text-gray-500">
    ${
        inv.investment_plans
            ? `${inv.investment_plans.duration_months} months - ${inv.investment_plans.roi_percentage}% ROI`
            : "-"
    }
</p>
                    </td>
                    <td class="py-4 px-4 font-semibold text-primary">₦${Number(inv.total_invested || 0).toLocaleString()}</td>
                    <td class="py-4 px-4 font-semibold text-accent">
    ₦${(
        Number(inv.slot_price || 0) *
        Number(inv.number_of_slots || 1) *
        Number(inv.investment_plans?.roi_percentage || 0) / 100
    ).toLocaleString()}
</td>
                    <td class="py-4 px-4">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${getPaymentStatusClass(inv.payment_status)}">${inv.payment_status}</span>
                    </td>
                    <td class="py-4 px-4">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${getInvestmentStatusClass(inv.investment_status)}">${inv.investment_status}</span>
                    </td>
                    <td class="py-4 px-4 text-gray-500">${new Date(inv.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        function getPaymentStatusClass(status) {
            switch(status) {
                case 'verified': return 'bg-green-100 text-green-800';
                case 'pending': return 'bg-yellow-100 text-yellow-800';
                case 'rejected': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function getInvestmentStatusClass(status) {
            switch(status) {
                case 'active': return 'bg-green-100 text-green-800';
                case 'pending': return 'bg-yellow-100 text-yellow-800';
                case 'completed': return 'bg-blue-100 text-blue-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        document.getElementById('statusFilter').addEventListener('change', () => {
            renderInvestments(allInvestments);
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        checkAuth();
        fetchInvestments();

        const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleSidebar() {
    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");
}

function closeSidebar() {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
}

window.addEventListener("resize", () => {
    if (window.innerWidth >= 1024) {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.add("hidden");
    } else {
        sidebar.classList.add("-translate-x-full");
    }
});

document.querySelectorAll("#sidebar a").forEach(link => {
    link.addEventListener("click", () => {
        if (window.innerWidth < 1024) {
            closeSidebar();
        }
    });
});
    </script>
