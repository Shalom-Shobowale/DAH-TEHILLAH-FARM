        <!-- Close Button -->

    </div>

            <nav class="space-y-2">
                <a href="dashboard.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="members.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
                    Members
                </a>
                <a href="investments.html" class="flex items-center px-4 py-3 bg-primary/50 text-white rounded-lg border-l-4 border-accent">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Investments
                </a>
                <a href="plans.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Plans
                </a>
                <a href="payment-accounts.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                    Payment Accounts
                </a>
                <a href="activity-logs.html" class="flex items-center px-4 py-3 text-white/70 hover:bg-primary/30 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Activity Logs
                </a>
            </nav>

            <div class="absolute bottom-6 left-6 right-6">
                <button onclick="logout()" class="w-full flex items-center px-4 py-3 text-white/70 hover:bg-red-600 hover:text-white rounded-lg transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-64 p-4 md:p-6 lg:p-8 overflow-x-hidden">
           <header class="flex flex-wrap justify-between items-center gap-4 mb-8">

                <div class="flex items-center gap-3">
                
                <button
                onclick="toggleSidebar()"
                class="lg:hidden bg-primary text-white p-2 rounded-lg shadow">
                
                <svg xmlns="http://www.w3.org/2000/svg"
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                
                <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
                
                </svg>

                </button>

                <div>
                
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">
                Investment Management
                </h1>

                <p class="text-gray-500">
                Review and manage member investments
                </p>

                </div>

                </div>

                <select
                id="statusFilter"
                class="w-full sm:w-56 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary">

                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="verified">Verified</option>
                <option value="rejected">Rejected</option>

                </select>

            </header>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Member</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Plan</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Amount</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Expected Return</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Payment Status</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Investment Status</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Proof</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Date</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="investmentsTable">
                            <tr><td colspan="9" class="text-center py-8 text-gray-500">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="proofModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-2xl w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">Proof of Payment</h2>
                <button onclick="closeProofModal()" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="proofContent" class="text-center">
                <p class="text-gray-500">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('accessToken');
            console.log("TOKEN:", token);
            if (!user || !token || user.role !== 'admin') {
                window.location.href = 'login.html';
            }
        }

        async function fetchInvestments() {
            const status = document.getElementById('statusFilter').value;
            const token = localStorage.getItem('accessToken');
            console.log("TOKEN:", token);

            try {
                const params = new URLSearchParams();
                if (status !== 'all') params.append('status', status);

                const response = await fetch(`https://dah-tehillah-farm.onrender.com/api/admin/investments?${params.toString()}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    renderInvestments(data.data);
                }
            } catch (error) {
                console.error('Error fetching investments:', error);
            }
        }

        function renderInvestments(investments) {
            const tbody = document.getElementById('investmentsTable');
            if (investments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8 text-gray-500">No investments found</td></tr>';
                return;
            }

            tbody.innerHTML = investments.map(inv => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="py-4 px-4">
                        <p class="font-semibold text-gray-800">${inv.users?.full_name || 'N/A'}</p>
                        <p class="text-sm text-gray-500">${inv.users?.email || ''}</p>
                    </td>
                    <td class="py-4 px-4">
                        <p class="font-semibold">${inv.investment_plans?.title || 'N/A'}</p>
                        <p class="text-sm text-gray-500">${inv.investment_plans?.duration_months} months - ${inv.investment_plans?.roi_percentage}% ROI</p>
                    </td>
                    <td class="py-4 px-4 font-semibold text-primary">₦${parseFloat(inv.amount).toLocaleString()}</td>
                    <td class="py-4 px-4 font-semibold text-accent">₦${parseFloat(inv.expected_return).toLocaleString()}</td>
                    <td class="py-4 px-4"><span class="px-3 py-1 rounded-full text-xs font-semibold ${getPaymentStatusClass(inv.payment_status)}">${inv.payment_status}</span></td>
                    <td class="py-4 px-4"><span class="px-3 py-1 rounded-full text-xs font-semibold ${getInvestmentStatusClass(inv.investment_status)}">${inv.investment_status}</span></td>
                    <td class="py-4 px-4">
                        ${inv.proof_of_payment ? `<button onclick="viewProof('${inv.proof_of_payment}')" class="text-primary hover:underline text-sm">View</button>` : '<span class="text-gray-400">No proof</span>'}
                    </td>
                    <td class="py-4 px-4 text-gray-600">${new Date(inv.created_at).toLocaleDateString()}</td>
                    <td class="py-4 px-4">
                        ${inv.payment_status === 'pending' ? `
                            <div class="flex space-x-2">
                                <button onclick="approveInvestment('${inv.id}')" class="bg-primary text-white px-3 py-1 rounded-lg text-sm hover:bg-green-800">Approve</button>
                                <button onclick="rejectInvestment('${inv.id}')" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600">Reject</button>
                            </div>
                        ` : '<span class="text-gray-400">-</span>'}
                    </td>
                </tr>
            `).join('');
        }

        function getPaymentStatusClass(status) {
            switch(status) {
                case 'verified': return 'bg-green-100 text-green-800';
                case 'pending': return 'bg-yellow-100 text-yellow-800';
                case 'rejected': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function getInvestmentStatusClass(status) {
            switch(status) {
                case 'active': return 'bg-green-100 text-green-800';
                case 'pending': return 'bg-yellow-100 text-yellow-800';
                case 'completed': return 'bg-blue-100 text-blue-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function viewProof(path) {
            const modal = document.getElementById('proofModal');
            const content = document.getElementById('proofContent');

            const ext = path.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                content.innerHTML = `<iframe src="/${path}" class="w-full h-96 rounded-lg border"></iframe>`;
            } else {
                content.innerHTML = `<img src="/${path}" class="max-h-96 mx-auto rounded-lg" alt="Proof of Payment">`;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeProofModal() {
            const modal = document.getElementById('proofModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function approveInvestment(id) {
            if (!confirm('Approve this investment?')) return;
            const token = localStorage.getItem('accessToken');
            console.log("TOKEN:", token);
            try {
                const response = await fetch(`https://dah-tehillah-farm.onrender.com/api/admin/investments/${id}/approve`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    alert('Investment approved successfully');
                    fetchInvestments();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Error approving investment');
            }
        }

        async function rejectInvestment(id) {
            if (!confirm('Reject this investment?')) return;
            const token = localStorage.getItem('accessToken');
            console.log("TOKEN:", token);
            try {
                const response = await fetch(`https://dah-tehillah-farm.onrender.com/api/admin/investments/${id}/reject`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    alert('Investment rejected');
                    fetchInvestments();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Error rejecting investment');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        document.getElementById('statusFilter').addEventListener('change', fetchInvestments);

        checkAuth();
        fetchInvestments();

        const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleSidebar() {

    sidebar.classList.remove("-translate-x-full");
    overlay.classList.remove("hidden");

}

function closeSidebar() {

    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");

}

window.addEventListener("resize", () => {

    if (window.innerWidth >= 1024) {

        sidebar.classList.remove("-translate-x-full");
        overlay.classList.add("hidden");

    } else {

        sidebar.classList.add("-translate-x-full");

    }

});

document.querySelectorAll("#sidebar a").forEach(link => {

    link.addEventListener("click", () => {

        if (window.innerWidth < 1024) {

            closeSidebar();

        }

    });

});
    </script>
</body>
