        </div>

        <main class="flex-1 p-4 md:p-6 lg:p-8 overflow-x-hidden">
            <header class="flex items-center justify-between mb-8">

    <div class="flex items-center gap-3">

        <!-- Hamburger -->
        <button
            onclick="toggleSidebar()"
            class="lg:hidden bg-primary text-white p-2 rounded-lg shadow-lg">

            <svg xmlns="http://www.w3.org/2000/svg"

                    d="M4 6h16M4 12h16M4 18h16"/>
            </svg>

        </button>

        <div>
            <h1 class="text-3xl font-bold text-gray-800">
                Activity Logs
            </h1>

            <p class="text-gray-500">
                Track all admin activities
            </p>
        </div>

    </div>

</header>

            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Admin</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Action</th>
                                <th class="text-left py-3 px-4 text-gray-600 font-semibold">Date & Time</th>
                            </tr>
                        </thead>
                        <tbody id="logsTable">
                            <tr><td colspan="3" class="text-center py-8 text-gray-500">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('accessToken');
            if (!user || !token || user.role !== 'admin') {
                window.location.href = 'login.html';
            }
        }

        async function fetchLogs() {
            const token = localStorage.getItem('accessToken');
            try {
                const response = await fetch('https://api.da-tehillah-farms.com/api/admin/activity-logs', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    renderLogs(data.data);
                }
            } catch (error) {
                console.error('Error fetching logs:', error);
            }
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('logsTable');
            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-8 text-gray-500">No activity logs found</td></tr>';
                return;
            }

            tbody.innerHTML = logs.map(log => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="py-4 px-4">
                        <div class="flex items-center">
                            <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center text-white text-sm font-bold mr-3">
                                ${(log.users?.full_name || 'A').charAt(0)}
                            </div>
                            <div>
                                <p class="font-semibold text-gray-800">${log.users?.full_name || 'Unknown'}</p>
                                <p class="text-sm text-gray-500">${log.users?.email || ''}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-gray-600">${log.action}</td>
                    <td class="py-4 px-4 text-gray-500">${new Date(log.created_at).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        checkAuth();
        fetchLogs();


        const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleSidebar() {

    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");

}

function closeSidebar() {

    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");

}

// Close sidebar automatically when clicking a menu link
document.querySelectorAll("#sidebar a").forEach(link => {

    link.addEventListener("click", () => {

        if (window.innerWidth < 1024) {

            closeSidebar();

        }

    });

});

// Hide sidebar when screen resizes to desktop
window.addEventListener("resize", () => {

    if (window.innerWidth >= 1024) {

        sidebar.classList.remove("-translate-x-full");
        overlay.classList.add("hidden");

    } else {

        sidebar.classList.add("-translate-x-full");

    }

});
    </script>
</body>
